<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecrire à Pius</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
<style>
    body {
        font-family: "Josefin Sans", system-ui;
        margin: 0;
        padding: 0;
        background: #a68310;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
    }

    .container {
      max-width: 50%;
      margin: 50px 20px;
      background-color: #565142;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }
    
    p {
    color: #F5F5DC;
    font-size: 16px;
    line-height: 28px;
    text-align: justify;
    }

    h2 {
        grid-column: span 2;
        text-align: center;
        color: #edb809;
        margin-bottom: 30px;
        font-size: 2.2rem;
    }

    
    /* Formulaire */
    form {
        display: flex;
        flex-direction: column;
        gap: 15px;
        width: 100%;
        max-width: 500px;
    }

    label {
        font-weight: 600;
        color: #edb809;
    }

    input, textarea {
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #ccc;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    input:focus, textarea:focus {
        outline: none;
        border-color: #edb809;
        box-shadow: 0 0 10px rgba(0,121,107,0.2);
    }

    button {
        padding: 12px;
        background-color: #edb809;
        color: #fff;
        font-weight: 600;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    button:hover {
        background-color: #edb809;
        transform: translateY(-2px);
    }

    /* Responsive */
    @media(max-width: 768px) {
        .container {
            grid-template-columns: 1fr;
            padding: 30px;
        }
        .contact-info {
            border-right: none;
            padding-right: 0;
            border-bottom: 1px solid #ccc;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2rem;
        }
    }

     /* BOUTON THÈME */
    #theme-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #edb809;
    border: none;
    border-radius: 50%;
    width: 45px;
    height: 45px;
    font-size: 20px;
    cursor: pointer;
    z-index: 9999;
    }

/* MODE SOMBRE */
body.dark-mode {
    background: #1a1a1a;
}

body.dark-mode .container {
    background-color: #2a2a2a;
}


</style>
</head>
<body>
    <button id="theme-btn" onclick="toggleTheme()">🌙</button>

<div class="container">
    <h2>Me laisser un message</h2>
    <p>Pour tout vos suggestions, message de correction, d'encouragement ou même besoin de mes services, envoyé moi un message.</p>

    <!-- Formulaire -->
    <form action="https://formspree.io/f/mzdlendl" method="POST">
        <label for="name">Nom complet 🪪:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Adresse email ✉:</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Téléphone 📞:</label>
        <input type="text" id="phone" name="phone">

        <label for="message">Votre message 📥:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit">Envoyer 📩</button>
    </form>
</div>

<script>
function toggleTheme() {
    document.body.classList.toggle("dark-mode");
    const btn = document.getElementById("theme-btn");
    btn.textContent = document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
}
</script>

</body>
</html>
